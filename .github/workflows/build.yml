name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Java
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # Dependencies
      - name: Get dependencies
        run: flutter pub get

      # Generate icons
      - name: Generate app icons
        run: dart run flutter_launcher_icons

      # Clean
      - name: Clean project
        run: flutter clean

      # Build Release APK (Keys direct)
      - name: Build APK (Release)
        run: |
          flutter build apk \
            --release \
            --dart-define=SUPABASE_URL=https://otsbbqlprcoadbmvgxvq.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90c2JicWxwcmNvYWRibXZneHZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODQwMDksImV4cCI6MjA5MDQ2MDAwOX0.bxp0A54tll6fYMd3_ahPt6eOGDwIBt-o1-u6FpNxBg4 \
            --dart-define=GROQ_API_KEY=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

      # Upload APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: halal-com-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
