name: halal_com
description: Halal & Haram Product Tracker for Muslims — Halalbillionaires

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # HTTP & Networking
  http: ^1.2.1
  dio: ^5.4.3+1

  # Environment
  flutter_dotenv: ^5.1.0

  # Barcode Scanner
  mobile_scanner: ^4.0.1

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  percent_indicator: ^4.2.3

  # Storage & Prefs
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

  # 🔥 ADD THIS (for app icon)
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/icon.png
    - assets/images/
    - assets/lottie/

# 🔥 App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: false

  image_path: "assets/icon.png"

  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon.png"
