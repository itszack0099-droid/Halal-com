plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.halalbillionaires.halal_com"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.halalbillionaires.halal_com"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"

        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

flutter {
    source "../.."
}

dependencies {

    // 🔥 REQUIRED — fixes Material theme error
    implementation "com.google.android.material:material:1.11.0"

    // 🔥 REQUIRED — fixes SplashScreen error
    implementation "androidx.core:core-splashscreen:1.0.1"

}
